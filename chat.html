            // 实际发送消息的核心函数
            const doSendMessage = async (content, images, useDeepSearch) => {
                // 构建 content 列表
                const contentList = [];
                
                // 添加文本块
                if (content) {
                    contentList.push({
                        type: 'text',
                        text: content
                    });
                }
                
                // 添加图片块
                images.forEach(img => {
                    // 从 base64 data URL 中提取 media_type 和纯 base64 数据
                    const mediaTypeMatch = img.base64.match(/^data:([^;]+);base64,/);
                    const mediaType = mediaTypeMatch ? mediaTypeMatch[1] : 'image/png';
                    const base64Data = img.base64.replace(/^data:[^;]+;base64,/, '');
                    
                    contentList.push({
                        type: 'image',
                        source: {
                            type: 'base64',
                            media_type: mediaType,
                            data: base64Data
                        }
                    });
                });

                const userMessage = {
                    role: 'user',
                    content: content,
                    images: images.map(img => img.base64)
                };

                // 在添加消息之前重置滚动状态
                userScrolledRef.current = false;
                // 重置打断标志
                abortRef.current = false;
                console.log('开始新对话，重置滚动状态');

                setMessages(prev => [
                    ...prev,
                    userMessage,
                    {
                        role: 'assistant',
                        contents: []
                    }
                ]);
                setIsWaitingRequestId(true);

                try {
                    const headers = {
                        'Content-Type': 'application/json'
                    };
                    if (urlTokenRef.current) {
                        headers['Authorization'] = `Bearer ${urlTokenRef.current}`;
                    }
                    const response = await fetch('/chat', {
                        method: 'POST',
                        headers: headers,
                        body: JSON.stringify({
                            session_id: sessionId,
                            content: contentList,
                            deepresearch: useDeepSearch
                        })
                    });

                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }

                    const reader = response.body.getReader();
                    const decoder = new TextDecoder();
                    let buffer = '';
                    let messageBlocks = new Map();
                    let messageIdOrder = [];
                    let requestIdReceived = false;

                    while (true) {
                        if (abortRef.current) {
                            reader.cancel();
                            break;
                        }

                        const { done, value } = await reader.read();

                        if (done) break;

                        if (abortRef.current) {
                            reader.cancel();
                            break;
                        }

                        buffer += decoder.decode(value, { stream: true });
                        const lines = buffer.split('\n\n');
                        buffer = lines.pop() || '';

                        for (const line of lines) {
                            if (abortRef.current) break;

                            if (line.startsWith('data: ')) {
                                try {
                                    const data = JSON.parse(line.slice(6));

                                    if (data.request_id && !requestIdReceived) {
                                        currentRequestIdRef.current = data.request_id;
                                        requestIdReceived = true;
                                        setIsWaitingRequestId(false);
                                        setIsLoading(true);
                                    }

                                    const msgId = data.msg_id || 'unknown';
                                    if (data.plan !== undefined) {
                                        setCurrentPlan(data.plan || null);
                                    }
                                    if (!messageBlocks.has(msgId)) {
                                        messageIdOrder.push(msgId);
                                    }
                                    messageBlocks.set(msgId, data.contents || []);
                                    if (abortRef.current) break;
                                    setMessages(prev => {
                                        if (abortRef.current) return prev;
                                        const newMessages = [...prev];
                                        const lastMsg = newMessages[newMessages.length - 1];
                                        const allContents = [];
                                        for (const id of messageIdOrder) {
                                            const blockContents = messageBlocks.get(id);
                                            if (blockContents && blockContents.length > 0) {
                                                allContents.push(...blockContents);
                                            }
                                        }
                                        if (lastMsg && lastMsg.role === 'assistant') {
                                            newMessages[newMessages.length - 1] = {
                                                role: 'assistant',
                                                contents: allContents
                                            };
                                        } else {
                                            newMessages.push({
                                                role: 'assistant',
                                                contents: allContents
                                            });
                                        }
                                        return newMessages;
                                    });
                                } catch (e) {
                                    console.error('Failed to parse SSE data:', e);
                                }
                            }
                        }
                    }
                } catch (error) {
                    console.error('Error sending message:', error);
                    setMessages(prev => [...prev, {
                        role: 'assistant',
                        contents: [{
                            type: 'error',
                            content: `错误: ${error.message}`
                        }]
                    }]);
                } finally {
                    if (!abortRef.current) {
                        setIsLoading(false);
                        setIsWaitingRequestId(false);
                        currentRequestIdRef.current = null;
                        setTimeout(() => {
                            if (inputRef.current) {
                                inputRef.current.focus();
                            }
                        }, 100);
                    }
                }
            };

            const handleKeyPress = (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    // 如果正在显示技能提示，选择当前技能
                    if (showSkillSuggestions) {
                        selectSkill(selectedSkillIndex);
                    } else {
                        sendMessage();
                    }
                } else if (e.key === 'ArrowDown' && showSkillSuggestions) {
                    e.preventDefault();
                    const filteredSkills = getFilteredSkills();
                    setSelectedSkillIndex(prev => 
                        prev < filteredSkills.length - 1 ? prev + 1 : prev
                    );
                } else if (e.key === 'ArrowUp' && showSkillSuggestions) {
                    e.preventDefault();
                    setSelectedSkillIndex(prev => prev > 0 ? prev - 1 : 0);
                } else if (e.key === 'Escape' && showSkillSuggestions) {
                    e.preventDefault();
                    setShowSkillSuggestions(false);
                }
            };

            // 获取过滤后的技能列表
            const getFilteredSkills = () => {
                const slashIndex = inputText.indexOf('/');
                if (slashIndex === -1) return [];
                const query = inputText.substring(slashIndex + 1).toLowerCase().trim();
                if (query === '') return skills;
                return skills.filter(skill => {
                    const skillName = skill.name || '';
                    const skillDesc = skill.description || '';
                    return skillName.toLowerCase().includes(query) || 
                           skillDesc.toLowerCase().includes(query);
                });
            };

            // 选择技能
            const selectSkill = (index) => {
                const filteredSkills = getFilteredSkills();
                if (index >= 0 && index < filteredSkills.length) {
                    const skill = filteredSkills[index];
                    const slashIndex = inputText.indexOf('/');
                    // 保留 / 之前的内容，替换成技能名
                    const beforeSlash = slashIndex > 0 ? inputText.substring(0, slashIndex) : '';
                    setInputText(`${beforeSlash}/${skill.name} `);
                    setShowSkillSuggestions(false);
                    // 设置光标到末尾
                    setTimeout(() => {
                        if (inputRef.current) {
                            inputRef.current.focus();
                            inputRef.current.setSelectionRange(
                                inputRef.current.value.length,
                                inputRef.current.value.length
                            );
                        }
                    }, 0);
                }
            };

            // 切换 tool_use 的展开/折叠状态
            const toggleToolUse = (toolUseId) => {
                setExpandedToolUseIds(prev => {
                    const newSet = new Set(prev);
                    if (newSet.has(toolUseId)) {
                        newSet.delete(toolUseId);
                    } else {
                        newSet.add(toolUseId);
                    }
                    return newSet;
                });
            };

            // 查找指定 tool_use_id 对应的 tool_result
            const findToolResult = (toolUseId) => {
                for (const msg of messages) {
                    const contents = Array.isArray(msg.contents) ? msg.contents : 
                                    (Array.isArray(msg.content) ? msg.content : []);
                    const toolResult = contents.find(
                        item => item.type === 'tool_result' && (item.tool_use_id === toolUseId || item.id === toolUseId)
                    );
                    if (toolResult) return toolResult;
                }
                return null;
            };

            // 格式化时间戳
            const formatTime = (timestamp) => {
                if (!timestamp) return '';
                const date = new Date(timestamp);
                return date.toLocaleString('zh-CN', {
                    month: '2-digit',
                    day: '2-digit',
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit'
                });
            };

            // Cron 观察窗口：展开/折叠状态管理
            const [cronExpandedToolIds, setCronExpandedToolIds] = useState(new Set());

            // Cron 消息容器引用和滚动状态
            const cronMessagesRef = useRef(null);
            const [cronShowScrollButton, setCronShowScrollButton] = useState(false);
            const cronUserScrolledRef = useRef(false);

            // Cron 滚动到底部
            const scrollCronToBottom = () => {
                if (cronMessagesRef.current) {
                    cronMessagesRef.current.scrollTop = cronMessagesRef.current.scrollHeight;
                    cronUserScrolledRef.current = false;
                    setCronShowScrollButton(false);
                }
            };

            // Cron 滚动事件处理
            const handleCronScroll = () => {
                const container = cronMessagesRef.current;
                if (!container) return;

                const { scrollTop, scrollHeight, clientHeight } = container;
                const distanceToBottom = scrollHeight - scrollTop - clientHeight;

                // 如果距离底部超过 50px，显示滚动按钮
                const shouldShow = distanceToBottom > 50;
                setCronShowScrollButton(shouldShow);
                if (shouldShow) {
                    cronUserScrolledRef.current = true;
                }
            };

            // 检查是否需要显示滚动按钮（内容高度超过容器）
            const checkCronScrollButton = () => {
                const container = cronMessagesRef.current;
                if (!container) return;
                const { scrollHeight, clientHeight } = container;
                const hasScrollableContent = scrollHeight > clientHeight + 50;
                // 只有在有内容且不在底部时才显示按钮
                if (hasScrollableContent) {
                    const { scrollTop } = container;
                    const distanceToBottom = scrollHeight - scrollTop - clientHeight;
                    setCronShowScrollButton(distanceToBottom > 50);
                } else {
                    setCronShowScrollButton(false);
                }
            };

            // Cron 数据更新时自动滚动到底部（如果用户没有主动向上滚动）
            useEffect(() => {
                if (activeTab === 'cron' && !cronUserScrolledRef.current) {
                    // 延迟滚动，等待渲染完成
                    const timer = setTimeout(() => {
                        scrollCronToBottom();
                    }, 100);
                    return () => clearTimeout(timer);
                }
            }, [cronHistory, activeTab]);

            // 切换到定时任务 Tab 时滚动到底部并检查是否需要显示滚动按钮
            useEffect(() => {
                if (activeTab === 'cron') {
                    // 延迟执行，等待渲染完成
                    const timer = setTimeout(() => {
                        scrollCronToBottom();
                        checkCronScrollButton();
                    }, 150);
                    return () => clearTimeout(timer);
                }
            }, [activeTab]);

            // 切换 Cron tool_use 展开状态
            const toggleCronToolUse = (toolUseId) => {
                setCronExpandedToolIds(prev => {
                    const newSet = new Set(prev);
                    if (newSet.has(toolUseId)) {
                        newSet.delete(toolUseId);
                    } else {
                        newSet.add(toolUseId);
                    }
                    return newSet;
                });
            };

            // 在 Cron 历史查找 tool_result（与对话 tab 保持一致，不限制 role）
            const findCronToolResult = (history, toolUseId) => {
                for (const msg of history) {
                    const contents = Array.isArray(msg.content) ? msg.content : 
                                    (Array.isArray(msg.contents) ? msg.contents : []);
                    const toolResult = contents.find(
                        item => item.type === 'tool_result' && (item.tool_use_id === toolUseId || item.id === toolUseId)
                    );
                    if (toolResult) return toolResult;
                }
                return null;
            };

            // 提取文本内容
            const extractTextContent = (content) => {
                if (typeof content === 'string') return content;
                if (Array.isArray(content)) {
                    return content
                        .filter(item => item.type === 'text')
                        .map(item => item.text)
                        .join('\n');
                }
                if (typeof content === 'object' && content !== null) {
                    if (content.text) return content.text;
                    return JSON.stringify(content);
                }
                return '';
            };

            // 渲染 Cron 消息内容（参考对话 tab 逻辑）
            const renderCronMessage = (msg, index, allHistory) => {
                const role = msg.role || 'system';
                const timestamp = msg.timestamp || msg.time;

                // User 消息：简单渲染文本
                if (role === 'user') {
                    const text = extractTextContent(msg.content);
                    return (
                        <div key={index} className="cron-message user">
                            <div className="cron-message-bubble">
                                {text}
                            </div>
                            {timestamp && (
                                <div className="cron-message-time">{formatTime(timestamp)}</div>
                            )}
                        </div>
                    );
                }

                // System 消息（tool_result）：跳过，在 tool_use 处聚合展示
                if (role === 'system') {
                    return null;
                }

                // Assistant 消息：处理 content/contents 数组，聚合 tool_use 和 tool_result
                const msgContent = Array.isArray(msg.contents) ? msg.contents :
                                  (Array.isArray(msg.content) ? msg.content : []);
                if (role === 'assistant' && msgContent.length > 0) {
                    return (
                        <div key={index} className="cron-message assistant">
                            <div className="cron-message-bubble">
                                {msgContent.map((item, idx) => {
                                    // text 类型（兼容 item.text 和 item.content）
                                    if (item.type === 'text') {
                                        const textContent = item.text || item.content || '';
                                        return (
                                            <div key={idx} className="message-content-item text markdown-content"
                                                dangerouslySetInnerHTML={{ __html: typeof marked !== 'undefined' ? marked.parse(textContent) : textContent }} />
                                        );
                                    }

                                    // tool_use 类型：可展开，聚合展示 tool_result
                                    if (item.type === 'tool_use') {
                                        const toolUseId = item.tool_use_id || item.id;
                                        const toolName = item.name || (item.content ? item.content.split(':')[0] : '未知工具');
                                        // 提取入参
                                        let toolInput = '';
                                        if (item.input) {
                                            toolInput = typeof item.input === 'string' ? item.input : JSON.stringify(item.input, null, 2);
                                        } else if (item.content && item.content.includes(':')) {
                                            const colonIndex = item.content.indexOf(':');
                                            toolInput = item.content.substring(colonIndex + 1).trim();
                                        }
                                        const isExpanded = cronExpandedToolIds.has(toolUseId);
                                        const toolResult = findCronToolResult(allHistory, toolUseId);

                                        return (
                                            <div key={toolUseId}>
                                                <div
                                                    className="message-content-item tool_use"
                                                    onClick={() => toggleCronToolUse(toolUseId)}
                                                    style={{ cursor: 'pointer' }}
                                                >
                                                    <div className="tool-use-header">
                                                        <span className={`tool-use-toggle ${isExpanded ? 'expanded' : ''}`}>▶</span>
                                                        <span>使用工具: {toolName}</span>
                                                    </div>
                                                    {toolInput && (
                                                        <div className="tool-use-params" style={{ marginLeft: '20px', marginTop: '4px', fontSize: '12px', opacity: 0.8, whiteSpace: 'pre-wrap', wordBreak: 'break-all' }}>
                                                            参数: {toolInput}
                                                        </div>
                                                    )}
                                                </div>
                                                {isExpanded && toolResult && (
                                                    <div className="message-content-item tool_result">
                                                        {extractTextContent(toolResult.output || toolResult.content)}
                                                    </div>
                                                )}
                                            </div>
                                        );
                                    }

                                    return null;
                                })}
                            </div>
                            {timestamp && (
                                <div className="cron-message-time">{formatTime(timestamp)}</div>
                            )}
                        </div>
                    );
                }

                // 默认渲染
                const text = extractTextContent(msg.content);
                return (
                    <div key={index} className={`cron-message ${role}`}>
                        <div className="cron-message-bubble">{text}</div>
                        {timestamp && <div className="cron-message-time">{formatTime(timestamp)}</div>}
                    </div>
                );
            };

            return (
                <>
                    <div className="chat-container">
                        <div className="chat-header">
                            <div className="chat-header-left">
                                <div className="chat-title-row">
                                    <h1>agentscope小龙虾</h1>
                                    <div className="header-links-inline">
                                        <a href="https://github.com/owenliang/openclaw" target="_blank" rel="noopener noreferrer">
                                            <img src="https://img.shields.io/badge/GitHub-Repository-blue?logo=github" alt="GitHub" />
                                        </a>
                                        <a href="https://space.bilibili.com/288748846" target="_blank" rel="noopener noreferrer">
                                            <img src="https://img.shields.io/badge/Bilibili-哔哩哔哩-pink?logo=bilibili" alt="Bilibili" />
                                        </a>
                                    </div>
                                </div>
                                <div style={{ fontSize: '12px', opacity: 0.9, marginTop: '4px' }}>
                                    {activeTab === 'chat' ? `Session: ${sessionId}` : 'Session: cronjob'}
                                </div>
                            </div>
                            <button className="new-chat-button" onClick={() => {
                                localStorage.removeItem('agentscope_session_id');
                                window.location.reload();
                            }}>
                                + 新建对话
                            </button>
                        </div>

                        {/* Tab 切换 */}
                        <div className="tab-container">
                            <button
                                className={`tab-button ${activeTab === 'chat' ? 'active' : ''}`}
                                onClick={() => setActiveTab('chat')}
                            >
                                对话
                            </button>
                            <button
                                className={`tab-button ${activeTab === 'cron' ? 'active' : ''}`}
                                onClick={() => setActiveTab('cron')}
                            >
                                定时任务
                            </button>
                        </div>

                        {activeTab === 'chat' ? (
                            <>
                        <div className="chat-messages" ref={messagesContainerRef} onScroll={handleScroll}>
                        {messages.map((message, index) => {
                            // 兼容多种格式：
                            // - 后端历史消息: message.content 是数组
                            // - 实时 assistant 消息: message.contents 是数组
                            // - 实时 user 消息: message.content 是字符串
                            const msgContent = Array.isArray(message.contents) ? message.contents :
                                              (Array.isArray(message.content) ? message.content : []);
                            return (
                            <div key={index} className={`message ${message.role}`}>
                                <div className="message-bubble">
                                    {message.role === 'user' ? (
                                        <div>
                                            {/* 优先使用 content 字符串（实时消息），否则从数组提取 */}
                                            <div>{typeof message.content === 'string' ? message.content : extractTextContent(msgContent)}</div>
                                            {/* 提取图片 - 优先使用 images 数组（实时消息），否则从 content 数组提取 */}
                                            {(message.images?.length > 0 || msgContent.filter(item => item.type === 'image').length > 0) && (
                                                <div className="user-images">
                                                    {message.images?.map((imgSrc, idx) => {
                                                        // 确保图片 src 是有效的 data URL，如果不是则添加前缀
                                                        const validSrc = imgSrc.startsWith('data:') ? imgSrc : `data:image/png;base64,${imgSrc}`;
                                                        return <img key={idx} src={validSrc} alt={`上传图片 ${idx + 1}`} />;
                                                    })}
                                                    {msgContent.filter(item => item.type === 'image').map((item, idx) => {
                                                        const imgData = item.source?.data || item.data;
                                                        // 确保图片 src 是有效的 data URL
                                                        const validSrc = imgData && imgData.startsWith('data:') ? imgData : `data:image/png;base64,${imgData}`;
                                                        return <img key={`c-${idx}`} src={validSrc} alt={`上传图片 ${idx + 1}`} />;
                                                    })}
                                                </div>
                                            )}
                                        </div>
                                    ) : (
                                        <div>
                                            {/* 对 msgContent 进行去重处理，相同 tool_use_id 只保留最后一个 */}
                                            {(() => {
                                                const seenToolUseIds = new Set();
                                                const deduplicatedContent = [];
                                                // 倒序遍历，保留最后一个
                                                for (let i = msgContent.length - 1; i >= 0; i--) {
                                                    const item = msgContent[i];
                                                    if (item.type === 'tool_use') {
                                                        const toolUseId = item.tool_use_id || item.id;
                                                        if (!seenToolUseIds.has(toolUseId)) {
                                                            seenToolUseIds.add(toolUseId);
                                                            deduplicatedContent.unshift(item);
                                                        }
                                                    } else {
                                                        deduplicatedContent.unshift(item);
                                                    }
                                                }
                                                return deduplicatedContent;
                                            })().map((item, idx) => {
                                                // tool_result 不直接渲染，会在 tool_use 下方展示
                                                if (item.type === 'tool_result') {
                                                    return null;
                                                }
                                                
                                                // 对 text 类型使用 markdown 渲染（兼容 item.text 和 item.content）
                                                if (item.type === 'text' && typeof marked !== 'undefined') {
                                                    const textContent = item.text || item.content || '';
                                                    return (
                                                        <div 
                                                            key={idx} 
                                                            className={`message-content-item ${item.type} markdown-content`}
                                                            dangerouslySetInnerHTML={{ __html: marked.parse(textContent) }}
                                                        />
                                                    );
                                                }
                                                
                                                // tool_use 类型：可点击展开/折叠，展示对应的 tool_result
                                                if (item.type === 'tool_use') {
                                                    // 兼容两种格式：
                                                    // - 实时消息: tool_use_id, content (包含名称和参数，格式: "tool_name: {json}")
                                                    // - 后端历史: id, name, input
                                                    const toolUseId = item.tool_use_id || item.id;
                                                    const toolName = item.name || (item.content ? item.content.split(':')[0] : '未知工具');
                                                    // 提取入参
                                                    let toolInput = '';
                                                    if (item.input) {
                                                        toolInput = typeof item.input === 'string' ? item.input : JSON.stringify(item.input, null, 2);
                                                    } else if (item.content && item.content.includes(':')) {
                                                        const colonIndex = item.content.indexOf(':');
                                                        toolInput = item.content.substring(colonIndex + 1).trim();
                                                    }
                                                    const isExpanded = expandedToolUseIds.has(toolUseId);
                                                    // 在整个消息列表中查找 tool_result（在 assistant 或 system 角色的消息中）
                                                    let toolResult = null;
                                                    for (const m of messages) {
                                                        const contents = Array.isArray(m.contents) ? m.contents : 
                                                                        (Array.isArray(m.content) ? m.content : []);
                                                        const found = contents.find(c => 
                                                            c.type === 'tool_result' && (c.tool_use_id === toolUseId || c.id === toolUseId)
                                                        );
                                                        if (found) {
                                                            toolResult = found;
                                                            break;
                                                        }
                                                    }
                                                    // 检查是否是最后一条消息且正在加载
                                                    const isLastMessage = index === messages.length - 1;
                                                    const showLoading = !toolResult && isLastMessage && isLoading;
                                                    
                                                    return (
                                                        <div key={toolUseId}>
                                                            <div 
                                                                className={`message-content-item ${item.type} ${showLoading ? 'loading' : ''}`}
                                                                onClick={() => toggleToolUse(toolUseId)}
                                                            >
                                                                <div className="tool-use-header">
                                                                    <span className={`tool-use-toggle ${isExpanded ? 'expanded' : ''}`}>
                                                                        ▶
                                                                    </span>
                                                                    <span>使用工具: {toolName}</span>
                                                                </div>
                                                                {toolInput && (
                                                                    <div className="tool-use-params" style={{ marginLeft: '20px', marginTop: '4px', fontSize: '12px', opacity: 0.8, whiteSpace: 'pre-wrap', wordBreak: 'break-all' }}>
                                                                        参数: {toolInput}
                                                                    </div>
                                                                )}
                                                            </div>
                                                            {isExpanded && toolResult && (
                                                                <div className="message-content-item tool_result">
                                                                    {extractTextContent(toolResult.output || toolResult.content)}
                                                                </div>
                                                            )}
                                                        </div>
                                                    );
                                                }
                                                
                                                // 其他类型保持原样
                                                return (
                                                    <div key={idx} className={`message-content-item ${item.type}`}>
                                                        {item.text || item.content}
                                                    </div>
                                                );
                                            })}
                                            {index === messages.length - 1 && isLoading && (
                                                <div style={{ marginTop: '8px' }}>
                                                    <span className="loading-indicator"></span>
                                                </div>
                                            )}
                                        </div>
                                    )}
                                </div>
                            </div>
                            );
                        })}
                        <div ref={messagesEndRef} />
                        {/* 滚动到底部按钮 */}
                        {showScrollButton && (
                            <button
                                className="scroll-to-bottom"
                                onClick={scrollToBottom}
                                title="滚动到底部"
                            >
                                ↓
                            </button>
                        )}
                    </div>

                    {/* 深度研究开关 - 单独一行 */}
                    <div className="deep-search-row">
                        <div
                            className={`deep-search-toggle ${deepSearch ? 'active' : ''} ${(isLoading || isWaitingRequestId) ? 'disabled' : ''}`}
                            onClick={() => !(isLoading || isWaitingRequestId) && setDeepSearch(!deepSearch)}
                        >
                            <span className="toggle-label">深度研究</span>
                            <div className="toggle-switch"></div>
                        </div>
                    </div>

                    <div className="chat-input-container">
                        {/* 排队中的消息显示在输入框上方 */}
                        {pendingRequest && (
                            <div className="pending-request-banner">
                                <div className="pending-request-content">
                                    <span className="pending-label">排队中</span>
                                    <span className="pending-text">{pendingRequest.content}</span>
                                    {pendingRequest.images && pendingRequest.images.length > 0 && (
                                        <span className="pending-images-count">📷 {pendingRequest.images.length}</span>
                                    )}
                                </div>
                                <button
                                    className="cancel-pending-btn"
                                    onClick={() => setPendingRequest(null)}
                                    title="取消排队"
                                >
                                    ✕
                                </button>
                            </div>
                        )}

                        {showSkillSuggestions && (
                            <div className="skill-suggestions">
                                {getFilteredSkills().length > 0 ? (
                                    getFilteredSkills().map((skill, index) => (
                                        <div
                                            key={skill.name}
                                            className={`skill-item ${index === selectedSkillIndex ? 'selected' : ''}`}
                                            onClick={() => selectSkill(index)}
                                            onMouseEnter={() => setSelectedSkillIndex(index)}
                                        >
                                            <div className="skill-name">/{skill.name}</div>
                                            {skill.description && (
                                                <div className="skill-description">{skill.description}</div>
                                            )}
                                        </div>
                                    ))
                                ) : (
                                    <div className="skill-suggestions-empty">没有找到匹配的技能</div>
                                )}
                            </div>
                        )}
                        
                        {/* 隐藏的文件输入 */}
                        <input
                            type="file"
                            ref={fileInputRef}
                            style={{ display: 'none' }}
                            accept="image/*"
                            multiple
                            onChange={handleImageSelect}
                        />
                        
                        {/* 图片上传按钮 */}
                        <button
                            className="image-upload-btn"
                            onClick={() => fileInputRef.current?.click()}
                            disabled={pendingRequest || isWaitingRequestId}
                            title="上传图片"
                        >
                            📷
                        </button>

                        {/* 已选图片预览 */}
                        {selectedImages.length > 0 && (
                            <div className="image-preview-container">
                                {selectedImages.map(img => (
                                    <div key={img.id} className="image-preview">
                                        <img src={img.base64} alt={img.name} />
                                        <button
                                            className="remove-btn"
                                            onClick={() => removeImage(img.id)}
                                            title="移除图片"
                                        >
                                            ×
                                        </button>
                                    </div>
                                ))}
                            </div>
                        )}

                        <input
                            ref={inputRef}
                            type="text"
                            className="chat-input"
                            placeholder={selectedImages.length > 0 ? "添加文字描述（可选）..." : "输入消息（输入 / 查看可用技能）..."}
                            value={inputText}
                            onChange={(e) => setInputText(e.target.value)}
                            onKeyDown={handleKeyPress}
                            onPaste={handlePaste}
                            disabled={pendingRequest || isWaitingRequestId}
                        />
                        <button
                            className="send-button"
                            onClick={sendMessage}
                            disabled={(!inputText.trim() && selectedImages.length === 0) || pendingRequest || isWaitingRequestId}
                        >
                            发送
                        </button>
                        {isLoading && (
                            <button
                                className="stop-button"
                                onClick={stopGeneration}
                            >
                                <div className="stop-icon"></div>
                                打断
                            </button>
                        )}
                    </div>
                            </>
                        ) : (
                            // Cron 观察窗口
                            <div className="cron-container" ref={cronMessagesRef} onScroll={handleCronScroll}>
                                <div className={`cron-refresh-indicator ${cronLoading ? 'refreshing' : ''}`}>
                                    {cronLastRefresh && (
                                        <span>上次更新: {formatTime(cronLastRefresh)}</span>
                                    )}
                                </div>
                                {cronHistory.length === 0 ? (
                                    <div className="cron-empty-state">
                                        <div className="icon">📋</div>
                                        <div>暂无定时任务历史记录</div>
                                        <div style={{ fontSize: '12px', marginTop: '8px', opacity: 0.7 }}>
                                            系统将每 5 秒自动刷新
                                        </div>
                                    </div>
                                ) : (
                                    cronHistory.map((msg, index) => renderCronMessage(msg, index, cronHistory))
                                )}
                                {/* 滚动到底部按钮 */}
                                {cronShowScrollButton && (
                                    <button
                                        className="cron-scroll-to-bottom"
                                        onClick={scrollCronToBottom}
                                        title="滚动到底部"
                                    >
                                        ↓
                                    </button>
                                )}
                            </div>
                        )}
                </div>

                {activeTab === 'chat' && currentPlan && renderPlan(currentPlan)}
                
                {activeTab === 'cron' && renderCronJobsPanel()}
            </>
            );
        }

        ReactDOM.render(<ChatApp />, document.getElementById('root'));
        console.log('✅ React 渲染完成:', new Date().toISOString());
    </script>
</body>
</html>
